name: Release

# Triggered by pushing a tag `v*`. Builds a universal macOS app, packages a
# zip, publishes a GitHub Release, and commits the regenerated cask to `main`.
# The main repo doubles as the Homebrew tap, so the cask bump is a same-repo
# push with the default GITHUB_TOKEN — no separate tap repo or PAT needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Package release artifacts
        run: ./scripts/package-release.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          Snapmark $VERSION

          ## Install

          \`\`\`sh
          brew tap rbmrs/snapmark https://github.com/rbmrs/snapmark
          brew trust rbmrs/snapmark
          brew install --cask snapmark
          open -a Snapmark
          \`\`\`

          Homebrew installs a prebuilt universal app. Xcode and Apple Command Line Tools are not required.
          \`brew trust\` is required on Homebrew 6.0+, which refuses to load third-party taps until trusted.

          ## Notes

          - Allow Screen Recording when macOS prompts on first capture.
          - Snapmark does not require Accessibility permission.
          - Snapmark is unsigned and not notarized; the cask strips the quarantine flag on install so it launches.
          - Release assets include the universal app zip and SHA256SUMS.txt.
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/*.zip dist/release/SHA256SUMS.txt --clobber
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" dist/release/*.zip dist/release/SHA256SUMS.txt \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          fi

      - name: Bump Casks/snapmark.rb on main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          git fetch origin main
          git checkout main
          cp dist/release/snapmark.rb Casks/snapmark.rb
          if git diff --quiet Casks/snapmark.rb; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/snapmark.rb
          git commit -m "chore(cask): bump snapmark to $VERSION"
          git push origin main

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package release artifacts
        run: ./scripts/package-release.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/*.zip dist/release/SHA256SUMS.txt dist/release/snapmark.rb --clobber
          else
            gh release create "$TAG" dist/release/*.zip dist/release/SHA256SUMS.txt dist/release/snapmark.rb \
              --title "$TAG" \
              --notes "Snapmark $TAG" \
              --verify-tag
          fi
